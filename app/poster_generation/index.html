<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football Insider Poster</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&family=Oswald:wght@600;700&family=Bebas+Neue&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="image-container">
            <img src="background.jpg" class="bg" alt="Background Image" />

            <div class='logo-wrap'><img src='logo.png' class='logo' alt='Logo' /></div>

            <div class="news-panel">
                <div class="category">INSIDER UPDATE</div>
                <h1>Neymar Returns</h1>
                <h2>Boost for Brazil Squad</h2>
            </div>
        </div>
    </div>
